{% extends 'base.html' %}
{% block title %}Dars qo'shish{% endblock %}
{% block content %}
<div class="ph"><div class="ph-left"><h1>Dars qo'shish — {{ course.name }}</h1></div><a href="{% url 'course_detail' course.pk %}" class="btn btn-outline">← Orqaga</a></div>
<div style="max-width:600px;"><div class="card"><div class="card-body">
  <form method="post" enctype="multipart/form-data">{% csrf_token %}
    <div class="form-group"><label>Dars nomi</label>{{ form.title }}</div>
    <div class="form-group"><label>Kontent / Tavsif</label>{{ form.content }}</div>
    <div class="form-row">
      <div class="form-group"><label>Tartib raqami</label>{{ form.order }}</div>
      <div class="form-group"><label>Video URL (ixtiyoriy)</label>{{ form.video_url }}</div>
    </div>
    <div class="form-group"><label>Fayl yuklash (PDF, DOCX...)</label>{{ form.file }}</div>
    <div class="form-actions"><button type="submit" class="btn btn-primary">+ Qo'shish</button><a href="{% url 'course_detail' course.pk %}" class="btn btn-outline">Bekor qilish</a></div>
  </form>
</div></div></div>
{% endblock %}
