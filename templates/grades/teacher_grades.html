{% extends 'base.html' %}
{% block title %}Baholar{% endblock %}
{% block content %}
<div class="ph"><div class="ph-left"><h1>Baholar jadvali 🏆</h1><p>Kurs tanlang</p></div></div>
<div class="course-grid">
  {% for course in courses %}
  <a href="{% url 'course_grades' course.pk %}" class="course-card animate" style="animation-delay:{{ forloop.counter0 }}00ms;">
    <div class="cc-thumb" style="background:linear-gradient(135deg,#1e3a5f,#0d2137);">
      <span style="font-size:36px;">{{ course.emoji }}</span>
    </div>
    <div class="cc-body">
      <div class="cc-name">{{ course.name }}</div>
      <div class="cc-meta">{{ course.enrolled_count }} talaba · Baholarni ko'rish →</div>
    </div>
  </a>
  {% empty %}
  <div class="empty"><div class="icon">📚</div><h3>Kurslar yo'q</h3></div>
  {% endfor %}
</div>
{% endblock %}
